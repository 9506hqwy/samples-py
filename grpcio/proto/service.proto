// https://protobuf.dev/programming-guides/proto3/
syntax = "proto3";

import "google/protobuf/any.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

package helloworld;

service Api {
  rpc Call (ScalarValueTypes) returns (ScalarValueTypes);
  rpc Download (google.protobuf.Empty) returns (stream Message);
  rpc Upload (stream Message) returns (google.protobuf.Empty);
  rpc Async(stream Message) returns (stream Message);
}

message ScalarValueTypes {
  double double = 1;
  float float = 2;
  int32 int32 = 3;
  int64 int64 = 4;
  uint32 uint32 = 5;
  uint64 uint64 = 6;
  sint32 sint32 = 7;
  sint64 sint64 = 8;
  fixed32 fixed32 = 9;
  fixed64 fixed64 = 10;
  sfixed32 sfixed32 = 11;
  sfixed64 sfixed64 = 12;
  bool bool = 13;
  string string = 14;
  bytes bytes = 15;
  repeated string array = 16;
  // https://protobuf.dev/programming-guides/proto3/#maps
  map<string, int32> map = 17;
  // https://protobuf.dev/programming-guides/proto3/#enum
  EnumerationValue enumvalue = 18;
  // https://protobuf.dev/programming-guides/proto3/#oneof
  oneof oneofname {
    int32 oneint32 = 19;
    string onestring = 20;
  }
  google.protobuf.Any any = 21;
  google.protobuf.Timestamp timestamp = 22;
}

message Message {
	string message = 1;
}

enum EnumerationValue {
	VALUE0 = 0;
	VALUE1 = 1;
	VALUE2 = 2;
}
